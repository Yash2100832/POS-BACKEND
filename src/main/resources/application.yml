spring:
  application:
    name: pos-system

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pos_temp}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:vardhany634@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:5000}

Razorpay:
  api:
    key: ${RAZORPAY_KEY:rzp_test_Sb0i5U7VR9mGU7}
    secret: ${RAZORPAY_SECRET:vlGmTD3eEpaRh3fowaVReqPv}

stripe:
  api:
    key: ${STRIPE_KEY:your_stripe_key}

app:
  frontend:
    reset-url: ${FRONTEND_URL:http://localhost:5173}/auth/reset-password?token=

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE
